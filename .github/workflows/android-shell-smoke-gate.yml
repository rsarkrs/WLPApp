name: Android Shell Smoke Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  android-shell-smoke:
    name: Android TWA Bootstrap Smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate bootstrap script syntax
        run: bash -n scripts/bootstrap_twa_project.sh

      - name: Run TWA bootstrap dry-run smoke
        run: npm run android:twa:smoke
