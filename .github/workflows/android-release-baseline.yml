name: Android Release Baseline (TWA)

on:
  workflow_dispatch:

jobs:
  android-release-baseline:
    name: Android TWA Signing Baseline
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Android release preflight
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: npm run android:release:preflight

      - name: TWA shell smoke
        run: npm run android:twa:smoke

      - name: Generate Android release packet
        run: npm run android:release:packet

      - name: Validate Android release packet artifact
        env:
          ANDROID_RELEASE_EXPECTED_SOURCE_REVISION: ${{ github.sha }}
          ANDROID_RELEASE_EXPECTED_CI_RUN_ID: ${{ github.run_id }}
          ANDROID_RELEASE_EXPECTED_CI_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: npm run android:release:packet:check

      - name: Prepare decoded keystore artifact
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p artifacts/android
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > artifacts/android/release-keystore.jks
          test -s artifacts/android/release-keystore.jks

      - name: Upload preflight artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-preflight
          path: |
            artifacts/android/release-keystore.jks
            docs/mobile/android-launch-readiness.md
            docs/mobile/android-release-path.md
            docs/mobile/play-store-submission-runbook.md
            artifacts/android/release-packet.json
