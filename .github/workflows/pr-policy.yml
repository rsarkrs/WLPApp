name: PR Policy Checks

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  naming-convention:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title prefix
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "Checking PR title: $PR_TITLE"
          if [[ ! "$PR_TITLE" =~ ^(Fix|Feat|Chore|Docs|Refactor|Test|Perf)/.+$ ]]; then
            echo "❌ PR title must start with one of: Fix/, Feat/, Chore/, Docs/, Refactor/, Test/, Perf/"
            exit 1
          fi

      - name: Validate source branch prefix
        env:
          SOURCE_BRANCH: ${{ github.head_ref }}
        run: |
          echo "Checking source branch: $SOURCE_BRANCH"
          if [[ ! "$SOURCE_BRANCH" =~ ^(Fix|Feat|Chore|Docs|Refactor|Test|Perf)/.+$ ]]; then
            echo "❌ Branch name must start with one of: Fix/, Feat/, Chore/, Docs/, Refactor/, Test/, Perf/"
            exit 1
          fi
