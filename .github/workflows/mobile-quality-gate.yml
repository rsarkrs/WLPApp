name: Mobile Quality Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lighthouse-mobile-gate:
    name: Lighthouse PWA + Performance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build -w apps/web

      - name: Run Lighthouse quality gate
        run: npm run qa:mobile
