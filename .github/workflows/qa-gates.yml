name: QA Gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  qa:
    name: Dedicated QA Phase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (metabolic + macro)
        run: npm run test:unit

      - name: Property and edge tests
        run: npm run test:property

      - name: Integration tests (planning + shopping)
        run: npm run test:integration

      - name: API contract tests
        run: npm run test:contract

      - name: Coverage gate (core engine)
        run: npm run coverage:check

      - name: Build
        run: npm run build

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: qa
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy placeholder
        run: echo "Deploy runs only after QA gate passes."
