name: Android Launch Readiness Gate

on:
  workflow_dispatch:
  push:
    tags:
      - 'android-v*'

jobs:
  launch-readiness:
    name: Android Launch Readiness
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate launch readiness baseline docs
        run: node scripts/check_android_launch_readiness.js

      - name: Execute mobile smoke gate
        run: npm run android:twa:smoke

      - name: Execute mobile Lighthouse gate
        run: npm run qa:mobile
